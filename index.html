<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2 style="color: #fff " class="pad center">A Front-End Developer Quiz</h2>
    <div class="container">
        <div class="record">
            <h4>Question <span id="currentquestion"></span> of <span id="allquestions"></span></h4>
            <h4>Score : <span class="current-score"></span></h4>
        </div>
        <p id="questionbank"></p>
        <ul>
            <li class="option optionOne" value="a"></li>
            <li class="option optionTwo" value="b"></li>
            <li class="option optionThree" value="c"></li>
            <li class="option optionFour" value="d"></li>
        </ul>
        <div class="btn-container">
            <button id="btn" class="btn hide">Next</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
